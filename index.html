<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weekly Meeting Schedule</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:#1E3A5F; --blue:#2C4F7A; --bg:#F5F5F3; --surface:#FFFFFF;
    --border:rgba(0,0,0,0.10); --text:#1a1a18; --muted:#5F5E5A; --hint:#888780;
    --info-bg:#E6F1FB; --info-fg:#0C447C; --warn-bg:#FAEEDA; --warn-fg:#633806;
    --done-bg:#F1EFE8; --done-fg:#888780; --cur-bg:#D6E8FB; --r-md:8px; --r-lg:12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  nav { background:var(--navy); padding:0 1.5rem; display:flex; align-items:center; justify-content:space-between; height:54px; }
  .nav-title { color:#fff; font-size:15px; font-weight:500; }
  .nav-sub { color:rgba(255,255,255,0.55); font-size:12px; }
  .nav-btn { background:rgba(255,255,255,0.12); border:0.5px solid rgba(255,255,255,0.25); color:#fff; border-radius:var(--r-md); padding:6px 14px; font-size:12px; cursor:pointer; font-family:inherit; margin-left:8px; }
  .nav-btn:hover { background:rgba(255,255,255,0.22); }
  main { max-width:860px; margin:0 auto; padding:1.5rem 1rem 3rem; }
  .card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--r-lg); padding:1.25rem; margin-bottom:1rem; }
  .card-label { font-size:11px; font-weight:500; color:var(--hint); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:1rem; }
  .hero { text-align:center; padding:2rem 1rem; }
  .hero-eye { font-size:11px; font-weight:500; color:var(--hint); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:0.5rem; }
  .hero-group { font-size:28px; font-weight:500; margin-bottom:0.3rem; }
  .hero-date { font-size:14px; color:var(--muted); margin-bottom:1.5rem; }
  .hero-members { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
  .mb { display:flex; flex-direction:column; align-items:center; gap:5px; }
  .av { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; }
  .av-sm { width:26px; height:26px; font-size:10px; }
  .av-name { font-size:11px; color:var(--muted); }
  .groups-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; margin-bottom:1rem; }
  .gcard { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--r-lg); padding:1rem; }
  .gcard.is-now { border:2px solid #378ADD; }
  .gcard-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.75rem; }
  .gcard-name { font-size:13px; font-weight:500; }
  .gcard-cnt { font-size:11px; color:var(--hint); margin-top:2px; }
  .pills { display:flex; flex-wrap:wrap; gap:5px; }
  .pill { display:flex; align-items:center; gap:4px; border-radius:999px; padding:2px 8px 2px 4px; font-size:11px; }
  .badge { display:inline-flex; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:500; }
  .b-now  { background:var(--info-bg); color:var(--info-fg); }
  .b-next { background:var(--warn-bg); color:var(--warn-fg); }
  .b-done { background:var(--done-bg); color:var(--done-fg); }
  .tl-item { display:flex; align-items:center; gap:12px; padding:9px 10px; border-radius:var(--r-md); }
  .tl-item.tl-cur { background:var(--cur-bg); }
  .tl-item.tl-past { opacity:0.42; }
  .tl-wk { font-size:11px; color:var(--hint); min-width:30px; }
  .tl-date { font-size:12px; color:var(--muted); min-width:130px; }
  .tl-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .tl-name { font-size:13px; font-weight:500; flex:1; }
  .tl-note { font-size:11px; color:var(--muted); font-style:italic; }
  .tl-sep { height:0.5px; background:var(--border); margin:2px 10px; }
  .state-box { text-align:center; padding:3rem 1rem; color:var(--muted); }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:#378ADD; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .footer { text-align:center; font-size:11px; color:var(--hint); margin-top:1rem; }
  .admin-bar { background:var(--warn-bg); border:0.5px solid #BA7517; border-radius:var(--r-md); padding:10px 16px; font-size:13px; color:var(--warn-fg); display:none; align-items:center; justify-content:space-between; margin-bottom:1rem; }
  .admin-bar.show { display:flex; }
  .sheets-link { color:#185FA5; text-decoration:none; font-weight:500; }
  .sheets-link:hover { text-decoration:underline; }
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:100; align-items:center; justify-content:center; }
  .modal-bg.open { display:flex; }
  .modal { background:var(--surface); border-radius:var(--r-lg); padding:2rem; width:100%; max-width:360px; margin:1rem; }
  .modal h2 { font-size:17px; font-weight:500; margin-bottom:0.4rem; }
  .modal p { font-size:13px; color:var(--muted); margin-bottom:1.25rem; line-height:1.5; }
  .modal input { width:100%; padding:9px 12px; border:0.5px solid var(--border); border-radius:var(--r-md); font-size:14px; font-family:inherit; margin-bottom:0.75rem; }
  .modal input:focus { outline:none; border-color:#378ADD; }
  .modal-btns { display:flex; gap:8px; }
  .btn { padding:8px 16px; border-radius:var(--r-md); border:0.5px solid var(--border); background:transparent; font-size:13px; cursor:pointer; font-family:inherit; color:var(--text); }
  .btn:hover { background:var(--bg); }
  .btn-p { background:var(--navy); color:#fff; border-color:var(--navy); }
  .btn-p:hover { background:var(--blue); }
  .err-msg { color:#A32D2D; font-size:12px; margin-bottom:0.5rem; display:none; }
</style>
</head>
<body>

<nav>
  <div><div class="nav-title">Weekly Meeting Schedule</div><div class="nav-sub">Every Wednesday</div></div>
  <div><button class="nav-btn" onclick="loadData()">Refresh</button><button class="nav-btn" onclick="openAdmin()">Admin</button></div>
</nav>

<main>
  <div class="admin-bar" id="admin-bar">
    <span>Admin mode — update STATUS column in Google Sheets to control the schedule</span>
    <a class="sheets-link" id="sheets-link" href="https://docs.google.com/spreadsheets/d/1BLKm081biJcGOQHjbX6U4c9m5ekx41JM/edit" target="_blank">Open Google Sheets →</a>
  </div>
  <div id="app"><div class="card"><div class="state-box"><div class="spinner"></div><p>Loading schedule...</p></div></div></div>
  <div class="footer" id="footer"></div>
</main>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>Admin access</h2>
    <p>Sign in to get a direct link to the Google Sheet where you can update the schedule.</p>
    <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()" />
    <div class="err-msg" id="err">Incorrect password.</div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="tryLogin()">Sign in</button>
    </div>
  </div>
</div>

<script>
const SHEET_ID  = "1BLKm081biJcGOQHjbX6U4c9m5ekx41JM";
const ADMIN_PASS = "admin123";

const GROUP_STYLES = {
  "project management":   {bg:"#E6F1FB",fg:"#0C447C",dot:"#378ADD"},
  "ai & technology":      {bg:"#EEEDFE",fg:"#3C3489",dot:"#7F77DD"},
  "supply chain":         {bg:"#E1F5EE",fg:"#085041",dot:"#1D9E75"},
  "communication skills": {bg:"#FAEEDA",fg:"#633806",dot:"#BA7517"},
};
const MEMBERS = {
  "project management":   ["Omar","Amr","Kareem"],
  "ai & technology":      ["Gaser","Mousa","Badawy","Abosrie"],
  "supply chain":         ["Bakar","Mohsen"],
  "communication skills": ["Aly","Adam","Mohannad"],
};
const GROUP_NAMES = ["Project management","AI & technology","Supply chain","Communication skills"];

function styleFor(n){return GROUP_STYLES[n.toLowerCase().trim()]||{bg:"#F1EFE8",fg:"#444441",dot:"#888780"};}
function membersFor(n){return MEMBERS[n.toLowerCase().trim()]||[];}
function ini(n){return n.slice(0,2).toUpperCase();}

async function loadData() {
  renderLoading();
  // Use the Google Sheets JSON feed — no publishing required, just needs the sheet to be shared as "anyone with link can view"
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Schedule`;
  try {
    const res  = await fetch(url);
    const text = await res.text();
    // Google wraps the JSON in /*O_o*/ google.visualization.Query.setResponse({...});
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows = parseGViz(json);
    render(rows);
    document.getElementById("footer").textContent =
      "Last updated: " + new Date().toLocaleTimeString("en-GB");
  } catch(e) {
    renderError(e);
  }
}

function parseGViz(json) {
  const cols = json.table.cols.map(c => c.label.toLowerCase().trim());
  const wkIdx  = cols.findIndex(c => c.includes("week"));
  const dtIdx  = cols.findIndex(c => c.includes("date"));
  const grIdx  = cols.findIndex(c => c.includes("group"));
  const memIdx = cols.findIndex(c => c.includes("member"));
  const stIdx  = cols.findIndex(c => c.includes("status"));
  const ovIdx  = cols.findIndex(c => c.includes("override"));
  const ntIdx  = cols.findIndex(c => c.includes("note"));

  return json.table.rows
    .map(r => {
      const v = i => (r.c[i] && r.c[i].v != null) ? String(r.c[i].v).trim() : "";
      return {
        week:     v(wkIdx),
        date:     v(dtIdx),
        group:    v(grIdx),
        members:  v(memIdx),
        status:   v(stIdx).toUpperCase(),
        override: v(ovIdx),
        notes:    v(ntIdx),
      };
    })
    .filter(r => r.week && r.week.toLowerCase().startsWith("wk") && r.group);
}

function render(rows) {
  const curIdx  = rows.findIndex(r => r.status === "CURRENT");
  const nextIdx = curIdx >= 0 ? curIdx + 1 : -1;
  const app = document.getElementById("app");
  app.innerHTML = "";

  // HERO
  const cur = curIdx >= 0 ? rows[curIdx] : null;
  const hero = document.createElement("div");
  hero.className = "card hero";
  if (cur) {
    const gname = cur.override || cur.group;
    const s = styleFor(gname); const mems = membersFor(gname);
    hero.innerHTML = `
      <div class="hero-eye">Presenting this Wednesday</div>
      <div class="hero-group" style="color:${s.fg}">${gname}</div>
      <div class="hero-date">${cur.date}</div>
      <div class="hero-members">
        ${mems.map(m=>`<div class="mb"><div class="av" style="background:${s.bg};color:${s.fg}">${ini(m)}</div><span class="av-name">${m}</span></div>`).join("")}
      </div>
      ${cur.notes?`<div style="margin-top:1rem;font-size:13px;color:var(--muted);font-style:italic">${cur.notes}</div>`:""}`;
  } else {
    hero.innerHTML = `<div class="hero-eye">No current week set</div>
      <div class="hero-group" style="color:var(--muted)">—</div>
      <div class="hero-date">Open Google Sheets and set STATUS to CURRENT for this week</div>`;
  }
  app.appendChild(hero);

  // GROUP CARDS
  const grid = document.createElement("div");
  grid.className = "groups-grid";
  GROUP_NAMES.forEach(gname => {
    const key = gname.toLowerCase().trim();
    const s = styleFor(gname); const mems = membersFor(gname);
    const isCur  = cur && (cur.override||cur.group).toLowerCase().trim() === key;
    const isNext = !isCur && nextIdx>=0 && (rows[nextIdx].override||rows[nextIdx].group).toLowerCase().trim()===key;
    const done   = rows.filter(r=>r.status==="DONE"&&(r.override||r.group).toLowerCase().trim()===key).length;
    const badge  = isCur?`<span class="badge b-now">This week</span>`:isNext?`<span class="badge b-next">Up next</span>`:done>0?`<span class="badge b-done">Done ${done}x</span>`:"";
    const card = document.createElement("div");
    card.className = "gcard"+(isCur?" is-now":"");
    card.innerHTML = `
      <div class="gcard-top"><div><div class="gcard-name">${gname}</div><div class="gcard-cnt">${mems.length} members</div></div>${badge}</div>
      <div class="pills">${mems.map(m=>`<div class="pill" style="background:${s.bg}"><div class="av av-sm" style="background:${s.bg};color:${s.fg}">${ini(m)}</div><span style="color:${s.fg}">${m}</span></div>`).join("")}</div>`;
    grid.appendChild(card);
  });
  app.appendChild(grid);

  // TIMELINE
  const tl = document.createElement("div");
  tl.className = "card";
  tl.innerHTML = `<div class="card-label">Full rotation — all Wednesdays</div>`;
  rows.forEach((r,i) => {
    const isCur = i===curIdx, isPast = r.status==="DONE"||i<curIdx;
    const gname = r.override||r.group; const s = styleFor(gname);
    const badge = isCur?`<span class="badge b-now">This week</span>`:isPast?`<span class="badge b-done">Done</span>`:"";
    const item = document.createElement("div");
    item.className = "tl-item"+(isCur?" tl-cur":isPast?" tl-past":"");
    item.innerHTML = `<span class="tl-wk">${r.week}</span><span class="tl-date">${r.date}</span><div class="tl-dot" style="background:${s.dot}"></div><span class="tl-name">${gname}</span>${r.notes?`<span class="tl-note">${r.notes}</span>`:""}${badge}`;
    tl.appendChild(item);
    if(i<rows.length-1){const sep=document.createElement("div");sep.className="tl-sep";tl.appendChild(sep);}
  });
  app.appendChild(tl);
}

function renderLoading(){document.getElementById("app").innerHTML=`<div class="card"><div class="state-box"><div class="spinner"></div><p>Loading schedule...</p></div></div>`;}
function renderError(e){
  console.error(e);
  document.getElementById("app").innerHTML=`<div class="card"><div class="state-box">
    <p style="font-size:14px">Could not load schedule.<br><br>
    Make sure your Google Sheet is shared as <strong>"Anyone with the link can view"</strong><br><br>
    <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank" style="color:#185FA5">Open Google Sheets →</a></p>
  </div></div>`;
}
function openAdmin(){document.getElementById("modal").classList.add("open");document.getElementById("pw").focus();}
function closeModal(){document.getElementById("modal").classList.remove("open");document.getElementById("pw").value="";document.getElementById("err").style.display="none";}
function tryLogin(){
  if(document.getElementById("pw").value===ADMIN_PASS){
    closeModal();
    document.getElementById("admin-bar").classList.add("show");
  } else {
    document.getElementById("err").style.display="block";
  }
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
